name: portfolio-prod

services:
  app:
    image: portfolio:latest
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    ports:
      - '80:3000'
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
