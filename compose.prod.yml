name: portfolio-prod

services:
  app:
    image: ${DOCKER_USERNAME:-cativo23}/portfolio:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      POW_GH_TOKEN: ${POW_GH_TOKEN:?POW_GH_TOKEN is required}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`cativo.dev`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.portfolio.loadbalancer.server.port=3000"
      - "traefik.docker.network=space-server_web"
    networks:
      - space-server_web
networks:
  space-server_web:
    external: true