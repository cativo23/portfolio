    <text x="60" y="229" xml:space="preserve"> / .__/\___/_/  \__/_/ \___/_/_/\___/</text>
    <text x="60" y="255" xml:space="preserve">/_/</text>
  </g>

  <rect x="103" y="237" width="12" height="22" fill="#9ece6a" opacity="0.85"/>

  <text class="sans" x="60" y="320" font-size="26" fill="#c0caf5" font-weight="500">Personal site at cativo.dev</text>
  <text class="sans" x="60" y="350" font-size="15" fill="#a9b1d6" opacity="0.85">Terminal-themed Nuxt 4 + Vue 3 with Tokyo Night palette</text>

  <g class="mono" font-size="13">
      <g transform="translate(60,408)">
