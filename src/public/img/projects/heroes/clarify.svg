<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="clarify — AI-powered contract auditing in plain language">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a1b26"/>
    </linearGradient>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, 'Courier New', monospace; }
      .sans { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <g opacity="0.06" stroke="#bb9af7" stroke-width="1">
    <line x1="0"   y1="120" x2="1200" y2="120"/>
    <line x1="0"   y1="360" x2="1200" y2="360"/>
    <line x1="60"  y1="0"   x2="60"   y2="480"/>
    <line x1="1140" y1="0"  x2="1140" y2="480"/>
  </g>

  <text class="mono" x="60" y="80" font-size="14" fill="#7aa2f7" opacity="0.65">cativo23@github:~$ npm run analyze</text>

  <g class="mono" font-size="22" fill="#bb9af7" filter="url(#softGlow)" font-weight="600">
    <text x="60" y="151" xml:space="preserve">      __         _ ___</text>
    <text x="60" y="177" xml:space="preserve"> ____/ /__ _____(_) _/_ __</text>
    <text x="60" y="203" xml:space="preserve">/ __/ / _ `/ __/ / _/ // /</text>
    <text x="60" y="229" xml:space="preserve">\__/_/\_,_/_/ /_/_/ \_, /</text>
    <text x="60" y="255" xml:space="preserve">                   /___/</text>
  </g>

  <rect x="380" y="237" width="12" height="22" fill="#bb9af7" opacity="0.85"/>

  <text class="sans" x="60" y="320" font-size="26" fill="#c0caf5" font-weight="500">AI-powered contract auditing in plain language</text>
  <text class="sans" x="60" y="350" font-size="15" fill="#a9b1d6" opacity="0.85">3-tier GPT strategy · Stripe credits · Supabase RLS · BullMQ</text>

  <g class="mono" font-size="13">
      <g transform="translate(60,408)">
        <rect width="84" height="32" rx="6" ry="6" fill="#1f2335" stroke="#9ece6a" stroke-opacity="0.45"/>
        <text x="42" y="21" fill="#9ece6a" text-anchor="middle">Nuxt 3</text>
      </g>
      <g transform="translate(154,408)">
        <rect width="84" height="32" rx="6" ry="6" fill="#1f2335" stroke="#bb9af7" stroke-opacity="0.45"/>
        <text x="42" y="21" fill="#bb9af7" text-anchor="middle">OpenAI</text>
      </g>
      <g transform="translate(248,408)">
        <rect width="84" height="32" rx="6" ry="6" fill="#1f2335" stroke="#bb9af7" stroke-opacity="0.45"/>
        <text x="42" y="21" fill="#bb9af7" text-anchor="middle">Stripe</text>
      </g>
      <g transform="translate(342,408)">
        <rect width="100" height="32" rx="6" ry="6" fill="#1f2335" stroke="#9ece6a" stroke-opacity="0.45"/>
        <text x="50" y="21" fill="#9ece6a" text-anchor="middle">Supabase</text>
      </g>
  </g>

  <text class="mono" x="1140" y="430" font-size="12" fill="#565f89" text-anchor="end" opacity="0.7">cativo23/clarify</text>
</svg>
