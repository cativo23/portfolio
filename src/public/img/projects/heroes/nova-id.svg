<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="nova-id — Production IAM on the Ory Stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a1b26"/>
    </linearGradient>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, 'Courier New', monospace; }
      .sans { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <g opacity="0.06" stroke="#7aa2f7" stroke-width="1">
    <line x1="0"   y1="120" x2="1200" y2="120"/>
    <line x1="0"   y1="360" x2="1200" y2="360"/>
    <line x1="60"  y1="0"   x2="60"   y2="480"/>
    <line x1="1140" y1="0"  x2="1140" y2="480"/>
  </g>

  <text class="mono" x="60" y="80" font-size="14" fill="#7aa2f7" opacity="0.65">cativo23@github:~$ ./scripts/setup-all-permissions.sh</text>

  <g class="mono" font-size="22" fill="#7aa2f7" filter="url(#softGlow)" font-weight="600">
    <text x="60" y="164" xml:space="preserve">                          _    __</text>
    <text x="60" y="190" xml:space="preserve">  ___  ___ _  _____ _____(_)__/ /</text>
    <text x="60" y="216" xml:space="preserve"> / _ \/ _ \ |/ / _ `/___/ / _  /</text>
    <text x="60" y="242" xml:space="preserve">/_//_/\___/___/\_,_/   /_/\_,_/</text>
  </g>

  <rect x="473" y="224" width="12" height="22" fill="#7aa2f7" opacity="0.85"/>

  <text class="sans" x="60" y="320" font-size="26" fill="#c0caf5" font-weight="500">Production IAM on the Ory Stack</text>
  <text class="sans" x="60" y="350" font-size="15" fill="#a9b1d6" opacity="0.85">Zero Trust · Kratos · Hydra · Keto · Oathkeeper · Vue 3 UIs</text>

  <g class="mono" font-size="13">
      <g transform="translate(60,408)">
        <rect width="60" height="32" rx="6" ry="6" fill="#1f2335" stroke="#f7768e" stroke-opacity="0.45"/>
        <text x="30" y="21" fill="#f7768e" text-anchor="middle">Ory</text>
      </g>
      <g transform="translate(130,408)">
        <rect width="76" height="32" rx="6" ry="6" fill="#1f2335" stroke="#9ece6a" stroke-opacity="0.45"/>
        <text x="38" y="21" fill="#9ece6a" text-anchor="middle">Vue 3</text>
      </g>
      <g transform="translate(216,408)">
        <rect width="84" height="32" rx="6" ry="6" fill="#1f2335" stroke="#7aa2f7" stroke-opacity="0.45"/>
        <text x="42" y="21" fill="#7aa2f7" text-anchor="middle">Docker</text>
      </g>
      <g transform="translate(310,408)">
        <rect width="116" height="32" rx="6" ry="6" fill="#1f2335" stroke="#bb9af7" stroke-opacity="0.45"/>
        <text x="58" y="21" fill="#bb9af7" text-anchor="middle">Zero Trust</text>
